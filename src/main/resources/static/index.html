<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #000000;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        /* Form Styles */
        .form-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        .form-container h2 {
            color: #1a1a2e;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .form-group input {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e94560;
        }

        .btn-container {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6152a8, #0f3460);
            color: white;
        }

        .btn-secondary {
            background: #2d2d44;
            color: rgba(255, 255, 255, 0.98);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }

        /* Search Bar */
        .search-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-container input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            min-width: 200px;
        }

        .search-container input:focus {
            outline: none;
            border-color: #e94560;
        }

        /* Table Styles */
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            overflow-x: auto;
        }

        .table-container h2 {
            color: #1a1a2e;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #433d9f, #6a5fd8);
        }

        thead th {
            color: white;
            padding: 15px;
            text-align: left;
            font-size: 0.95rem;
        }

        tbody tr {
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f0f0ff;
        }

        tbody td {
            padding: 12px 15px;
            color: #333;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 6px 15px;
            font-size: 0.85rem;
            border-radius: 6px;
        }

        /* Message Styles */
        .message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
        }

        .message-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Stats */
        .stats {
            color: #e94560;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎓 Student Management System</h1>
    <p class="stats">Total Students: <span id="totalStudents">0</span></p>

    <!-- Message -->
    <div id="message" class="message"></div>

    <!-- Add/Edit Form -->
    <div class="form-container">
        <h2 id="formTitle">➕ Add New Student</h2>
        <div class="form-grid">
            <input type="hidden" id="studentId">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" placeholder="Enter first name">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lastName" placeholder="Enter last name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter email">
            </div>
            <div class="form-group">
                <label>Department</label>
                <input type="text" id="department" placeholder="Enter department">
            </div>
            <div class="btn-container">
                <button class="btn btn-primary" onclick="saveStudent()">💾 Save Student</button>
                <button class="btn btn-secondary" onclick="clearForm()">🔄 Clear</button>
            </div>
        </div>
    </div>

    <!-- Search -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 Search by name...">
        <button class="btn btn-primary" onclick="searchStudents()">Search</button>
        <button class="btn btn-secondary" onclick="loadStudents()">Show All</button>
    </div>

    <!-- Table -->
    <div class="table-container">
        <h2>📋 Student List</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="studentTableBody">
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = '/api/students';

    // Load all students on page load
    window.onload = loadStudents;

    // Load All Students
    async function loadStudents() {
        try {
            const response = await fetch(API_URL);
            const students = await response.json();
            displayStudents(students);
            document.getElementById('totalStudents').textContent = students.length;
            document.getElementById('searchInput').value = '';
        } catch (error) {
            showMessage('Error loading students: ' + error.message, 'error');
        }
    }

    // Display Students in Table
    function displayStudents(students) {
        const tbody = document.getElementById('studentTableBody');
        tbody.innerHTML = '';

        if (students.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px; color:#999;">No students found 📭</td></tr>';
            return;
        }

        students.forEach(student => {
            const row = `
                    <tr>
                        <td>${student.id}</td>
                        <td>${student.firstName}</td>
                        <td>${student.lastName}</td>
                        <td>${student.email}</td>
                        <td>${student.department}</td>
                        <td class="action-btns">
                            <button class="btn btn-warning btn-sm" onclick="editStudent(${student.id})">✏️ Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteStudent(${student.id})">🗑️ Delete</button>
                        </td>
                    </tr>
                `;
            tbody.innerHTML += row;
        });
    }

    // Save Student (Create or Update)
    async function saveStudent() {
        const id = document.getElementById('studentId').value;
        const student = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            department: document.getElementById('department').value
        };

        // Basic validation
        if (!student.firstName || !student.lastName || !student.email || !student.department) {
            showMessage('Please fill in all fields!', 'error');
            return;
        }

        try {
            const url = id ? `${API_URL}/${id}` : API_URL;
            const method = id ? 'PUT' : 'POST';

            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(student)
            });

            if (response.ok) {
                showMessage(id ? 'Student updated successfully! ✅' : 'Student added successfully! ✅', 'success');
                clearForm();
                loadStudents();
            } else {
                const error = await response.json();
                const errorMsg = Object.values(error).join(', ');
                showMessage('Error: ' + errorMsg, 'error');
            }
        } catch (error) {
            showMessage('Error saving student: ' + error.message, 'error');
        }
    }

    // Edit Student
    async function editStudent(id) {
        try {
            const response = await fetch(`${API_URL}/${id}`);
            const student = await response.json();

            document.getElementById('studentId').value = student.id;
            document.getElementById('firstName').value = student.firstName;
            document.getElementById('lastName').value = student.lastName;
            document.getElementById('email').value = student.email;
            document.getElementById('department').value = student.department;
            document.getElementById('formTitle').textContent = '✏️ Edit Student';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (error) {
            showMessage('Error loading student: ' + error.message, 'error');
        }
    }

    // Delete Student
    async function deleteStudent(id) {
        if (!confirm('Are you sure you want to delete this student?')) return;

        try {
            const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            if (response.ok) {
                showMessage('Student deleted successfully! 🗑️', 'success');
                loadStudents();
            }
        } catch (error) {
            showMessage('Error deleting student: ' + error.message, 'error');
        }
    }

    // Search Students
    async function searchStudents() {
        const name = document.getElementById('searchInput').value;
        if (!name) {
            loadStudents();
            return;
        }

        try {
            const response = await fetch(`${API_URL}/search/name?name=${name}`);
            const students = await response.json();
            displayStudents(students);
            document.getElementById('totalStudents').textContent = students.length;
        } catch (error) {
            showMessage('Error searching: ' + error.message, 'error');
        }
    }

    // Clear Form
    function clearForm() {
        document.getElementById('studentId').value = '';
        document.getElementById('firstName').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('email').value = '';
        document.getElementById('department').value = '';
        document.getElementById('formTitle').textContent = '➕ Add New Student';
    }

    // Show Message
    function showMessage(msg, type) {
        const messageDiv = document.getElementById('message');
        messageDiv.textContent = msg;
        messageDiv.className = `message message-${type}`;
        messageDiv.style.display = 'block';
        setTimeout(() => { messageDiv.style.display = 'none'; }, 4000);
    }

    // Search on Enter key
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchStudents();
    });
</script>
</body>
</html>
